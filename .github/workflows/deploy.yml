name: Deploy
# CD: dispara DEPOIS do CI concluir com sucesso na main -> runner self-hosted (CT 30107).
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: [self-hosted, landing-promotor]
    steps:
      - name: Atualiza, builda e recarrega nginx
        run: |
          set -e
          cd /opt/landing-promotor
          git fetch --all --prune
          git reset --hard origin/main
          npm ci --no-audit --no-fund
          npm run build
          nginx -t && systemctl reload nginx
          echo "deploy OK -- landing-promotor publicado"
